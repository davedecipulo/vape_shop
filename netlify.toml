[build]
  publish = "."

[[redirects]]
  from = "/products/:slug"
  to = "/product.html?slug=:slug"
  status = 200

[[redirects]]
  from = "/catalog"
  to = "/catalog.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/dashboard.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: blob: https://*.supabase.co; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; frame-src https://www.google.com;"
